services:
  mysql:
    extends:
      file: ./backend/docker-compose.yml
      service: mysql

  redis:
    extends:
      file: ./backend/docker-compose.yml
      service: redis

  backend:
    extends:
      file: ./backend/docker-compose.yml
      service: backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pflex_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  redis_data:
