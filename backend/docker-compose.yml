version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pflex_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-pflex_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:6.2-alpine
    container_name: pflex_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pflex_backend
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-root}@mysql:3306/${DB_NAME:-pflex_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}

volumes:
  mysql_data:
