
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>P.FLEX (v21)</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --app-font-stack: sans-serif, 'Inter', system-ui; }
    html, body, app-root { font-family: var(--app-font-stack); }
    body { background-color: #F4F6F8; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--app-font-stack); }
    .font-secondary { font-family: var(--app-font-stack); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.1); }
    ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.4); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.6); }
    
    /* Global Gradient Mesh Background */
    .bg-gradient-mesh {
        background-color: #0B0E14;
        background-image: 
            radial-gradient(at 10% 20%, hsla(220,100%,15%,0.6) 0, transparent 50%), 
            radial-gradient(at 90% 80%, hsla(240,100%,15%,0.6) 0, transparent 50%),
            radial-gradient(at 50% 50%, hsla(210,100%,10%,1) 0, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
    }

    /* Common Glassmorphism Utilities */
    .glassmorphism {
        @apply bg-[rgba(30,41,59,0.4)] backdrop-blur-xl border border-[rgba(255,255,255,0.1)] shadow-[0_8px_32px_0_rgba(0,0,0,0.36)];
    }
    .glassmorphism-card {
         background-color: rgba(255, 255, 255, 0.05);
         backdrop-filter: blur(12px);
         border: 1px solid rgba(255, 255, 255, 0.1);
         box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
    }
    .glassmorphism-input {
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px);
        color: white;
    }
    .glassmorphism-input:focus {
        background-color: rgba(255, 255, 255, 0.1);
        outline: none;
    }

    /* PREVENT WHITE BACKGROUND ON AUTOFILL */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,
    select:-webkit-autofill,
    select:-webkit-autofill:hover,
    select:-webkit-autofill:focus {
      -webkit-text-fill-color: white;
      -webkit-box-shadow: 0 0 0px 1000px #0f172a inset;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        fontFamily: {
          sans: ['sans-serif', 'Inter', 'system-ui'],
          mono: ['sans-serif', 'Inter', 'system-ui'],
          serif: ['sans-serif', 'Inter', 'system-ui'],
        },
        extend: {
          colors: {
            brand: {
              dark: '#1E2A38',
              graphite: '#2F3A45',
              light: '#F4F6F8',
              action: '#2F80ED',
              success: '#27AE60',
              warning: '#F2C94C',
              critical: '#EB5757',
              auth: '#F2994A'
            },
            primary: "#3B82F6",
            secondary: "#64748B",
            "background-dark": "#0B0E14",
            "glass-bg": "rgba(30, 41, 59, 0.4)",
            "glass-border": "rgba(255, 255, 255, 0.1)",
            "neon-green": "#00FF66",
            "industrial-orange": "#F59E0B",
            "neon-red": "#FF0044",
            "neon-yellow": "#FFD600",
          },
          boxShadow: {
            'neon-green': '0 0 10px rgba(0, 255, 102, 0.3)',
            'neon-red': '0 0 10px rgba(239, 68, 68, 0.3)',
            'neon-yellow': '0 0 10px rgba(255, 214, 0, 0.5)',
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.36)',
            'glass-modal': '0 25px 50px -12px rgba(0, 0, 0, 0.5)',
          }
        }
      }
    }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
